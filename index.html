    const body=e ? `${e.name} · serie ${Math.min((e.done?.length||0)+1,e.sets)}/${e.sets}` : 'È ora di ripartire.';
    if('Notification' in window && Notification.permission==='granted'){
      const reg=await navigator.serviceWorker?.ready;
      if(reg) await reg.showNotification('PROJECT SC OS · Recupero terminato',{body,tag:'rest-finished',renotify:true});
      else new Notification('PROJECT SC OS · Recupero terminato',{body});
    }
    try{
      const ac=new (window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.value=.08;o.start();o.stop(ac.currentTime+.25);
    }catch(_){}
  }catch(err){console.warn('Notifica recupero:',err)}
}
function start(){const p=activeProgram(),s={id:'W'+Date.now(),program:p.name,programId:p.id,sub:p.goal,start:Date.now(),i:0,volume:0,totalSets:0,totalReps:0,status:'RUNNING',timerEnd:0,timerNotified:false,ex:p.exercises.map(d=>({...ex(d.id),sets:d.sets,reps:d.reps,rest:d.rest,done:[]}))};set(K.session,s);go('workout')}
function saveDraft(){let s=get(K.session,null),kg=document.getElementById('kg'),reps=document.getElementById('reps');if(!s||!kg||!reps)return;s.draft={exerciseId:s.ex[s.i].id,setNo:s.ex[s.i].done.length,kg:kg.value,reps:reps.value,rpe};set(K.session,s)}function selectRpe(v){rpe=v;document.querySelectorAll('.rpe button').forEach(b=>b.classList.toggle('on',+b.textContent===v));saveDraft()}
function saveSet(){let s=get(K.session,null),e=s.ex[s.i],kg=+document.getElementById('kg').value,reps=+document.getElementById('reps').value;if(reps<=0)return alert('Inserisci le ripetizioni. Anche il software ha dei limiti.');e.done.push({kg,reps,rpe,at:Date.now()});s.volume+=kg*reps;s.totalSets++;s.totalReps+=reps;s.timerEnd=Date.now()+e.rest*1000;s.timerNotified=false;if(e.done.length>=e.sets){delete s.draft;if(s.i<s.ex.length-1)s.i++;else s.status='READY'}else{s.draft={exerciseId:e.id,setNo:e.done.length,kg,reps,rpe}}set(K.session,s);render();showTimer()}
function showTimer(){let s=get(K.session,null);if(!s||s.timerEnd<=Date.now()){overlay.innerHTML='';return}let left=Math.ceil((s.timerEnd-Date.now())/1000),next=s.ex[s.i]||null;overlay.innerHTML=`<div class="timer-screen"><div class="timer-compact"><div><div class="small">RECUPERO</div><div class="timer-count" id="bigTimer">${fmt(left)}</div></div><div class="timer-next"><span>ADESSO / SUCCESSIVO</span><b>${next?next.name:'Workout completato'}</b><span>${next?`${next.base} · ${next.sets}×${next.reps}`:'Premi termina workout'}</span></div><div class="timer-actions"><button onclick="addTime()">+30</button><button class="skip" onclick="skipTimer()">SALTA</button></div></div></div>`}function skipTimer(){let s=get(K.session,null);if(s){s.timerEnd=0;set(K.session,s)}overlay.innerHTML='';render()}function addTime(){let s=get(K.session,null);if(s){s.timerEnd+=30000;set(K.session,s)}showTimer()}
function finish(){let s=get(K.session,null);s.end=Date.now();s.status='COMPLETED';s.timerEnd=0;let h=get(K.history,[]);h.unshift(s);set(K.history,h);advanceCoach(s.programId);localStorage.removeItem(K.session);rebuildMemory();overlay.innerHTML='';summary(s)}
function home(){let p=recommendedProgram(),pl=plan(),s=get(K.session,null),h=get(K.history,[])[0];app.innerHTML=`<div class="k">${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}</div><h1>${s?'SESSIONE IN CORSO':'TODAY'}</h1><p>${s?'Riprendi dal set esatto.':'Il Coach Engine ha scelto la prossima seduta in base al tuo percorso reale, non a un calendario che finge che la vita sia prevedibile.'}</p><section class="card hero"><span class="badge">${s?'● LIVE':'COACH RECOMMENDATION'}</span><h2 style="margin-top:13px">${s?s.program:p.name}</h2><div class="small">${s?s.sub:p.goal}</div><div class="meta"><span>${s?fmt((Date.now()-s.start)/1000):p.mins+' min'}</span><span>${s?s.totalSets:p.exercises.length+' esercizi'}</span><span>${s?vol(s.volume)+' kg':pl.mode.toUpperCase()+' · '+GOAL_LABELS[pl.goal]}</span></div><button class="btn primary" onclick="${s?"go('workout')":"start()"}">${s?'RIPRENDI WORKOUT':'INIZIA WORKOUT CONSIGLIATO'}</button></section><section class="card"><div class="k">CALENDARIZZAZIONE · ${pl.frequency} SEDUTE</div><div class="week">${weekPreview()}</div><button class="btn secondary" onclick="go('programs')">GESTISCI TRAINING PLAN</button></section><div class="stats"><div class="stat"><b>${h?vol(h.volume):0}</b><span>Ultimo volume</span></div><div class="stat"><b>${h?h.totalSets:0}</b><span>Serie</span></div><div class="stat"><b>${get(K.history,[]).length}</b><span>Workout storici</span></div><div class="stat"><b>${PROJECT_MILESTONES.length}</b><span>Build storiche</span></div></div>`}
function workout(){let s=get(K.session,null);if(!s){app.innerHTML='<section class="card"><h2>Nessun workout attivo</h2><button class="btn primary" onclick="go(\'home\')">HOME</button></section>';return}let e=s.ex[s.i],done=e.done.length,mem=memoryFor(e.id),auto=s.draft?.exerciseId===e.id&&s.draft.setNo===done?s.draft:(currentDefaults(e)||preload(e,done));rpe=+auto.rpe||8;let pr=((s.i+done/e.sets)/s.ex.length)*100;app.innerHTML=`<div class="stats"><div class="stat"><b id="elapsed">${fmt((Date.now()-s.start)/1000)}</b><span>Tempo</span></div><div class="stat"><b>${vol(s.volume)}</b><span>Volume</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div></div><section class="card"><div class="k">${e.id} · ${e.zone}</div><h1 onclick="openExercise('${e.id}')" style="cursor:pointer">${e.name} <span style="font-size:.45em;color:#888">SCHEDA ›</span></h1><div class="small">${e.base} · ${e.sets} × ${e.reps} · recupero ${e.rest}s</div><div class="progress" style="margin:15px 0"><i style="width:${pr}%"></i></div>${('Notification'in window&&Notification.permission!=='granted')?`<div class="notify-card"><b>AVVISO FINE RECUPERO</b><div class="small">Attiva una volta le notifiche. Su iPhone funziona dalla PWA installata.</div><button class="btn secondary" onclick="enableRestNotifications()">ATTIVA NOTIFICHE</button></div>`:''}${mem?`<div class="memory"><div class="small">MEMORY ENGINE · SET ${Math.min(done+1,mem.sets.length)} PRECARICATO</div><b>${auto.kg} kg · ${auto.reps} reps · RPE ${auto.rpe}</b><div class="small">Ultima volta: ${mem.program}</div></div>`:'<div class="memory"><b>PRIMA REGISTRAZIONE</b><div class="small">Da questa seduta il sistema ricorderà ogni set.</div></div>'}${s.status==='READY'?'<button class="btn primary" onclick="finish()">TERMINA WORKOUT</button>':`<div class="small">SET ${done+1} DI ${e.sets}</div><div class="form"><div class="step-field"><button type="button" onclick="adjustField('kg',-1)">−</button><div class="field"><label>KG</label><input id="kg" type="number" inputmode="decimal" step=".5" value="${auto.kg}" oninput="saveDraft()"></div><button type="button" onclick="adjustField('kg',1)">+</button></div><div class="step-field"><button type="button" onclick="adjustField('reps',-1)">−</button><div class="field"><label>REPS / SECONDI</label><input id="reps" type="number" inputmode="numeric" value="${auto.reps}" oninput="saveDraft()"></div><button type="button" onclick="adjustField('reps',1)">+</button></div></div><div class="small">RPE</div><div class="rpe">${[6,7,8,9,10].map(v=>`<button class="${rpe===v?'on':''}" onclick="selectRpe(${v})">${v}</button>`).join('')}</div><button class="btn primary" onclick="saveSet()">✓ COMPLETA SET</button>`}<div class="chips"><span class="chip">${e.muscles}</span></div><div class="small"><b>SETUP:</b> ${e.setup}</div>${e.link?`<a class="btn secondary mw-link" href="${e.link}" target="_blank" rel="noopener">▶ VEDI SU MUSCLEWIKI</a>`:""}<div style="margin-top:15px">${e.done.map((x,i)=>`<div class="setrow"><b>${i+1}</b><span>${x.kg} kg</span><span>${x.reps} reps</span><span>RPE ${x.rpe}</span><span class="ok">✓</span></div>`).join('')}</div></section><button class="btn danger" onclick="if(confirm('Annullare la sessione?')){localStorage.removeItem(K.session);go('home')}">ANNULLA SESSIONE</button>`}
function programs(){let pl=plan(),a=recommendedProgram().id,zones=['THE LAB','THE FORGE','THE ARENA'];app.innerHTML=`<div class="k">BUILD 006.1 · FLEX CALENDAR + EXERCISE AUDIT</div><h1>TRAINING PLAN</h1><p>Scegli quanto controllo lasciare al sistema. Le sedute completate fanno avanzare il ciclo; quelle saltate non vengono cancellate dall’universo.</p><div class="plan-tabs"><button class="${pl.mode==='auto'?'on':''}" onclick="setMode('auto')">AUTO</button><button class="${pl.mode==='goal'?'on':''}" onclick="setMode('goal')">GOAL</button><button class="${pl.mode==='manual'?'on':''}" onclick="setMode('manual')">MANUAL</button></div><section class="card"><div class="k">FREQUENZA SETTIMANALE</div><div class="choice">${[2,3,4].map(n=>`<button class="${pl.frequency===n?'on':''}" onclick="setFrequency(${n})">${n} SEDUTE</button>`).join('')}</div>${pl.mode!=='manual'?`<div class="k" style="margin-top:18px">OBIETTIVO</div><div class="choice">${Object.entries(GOAL_LABELS).map(([id,label])=>`<button class="${pl.goal===id?'on':''}" onclick="setGoal('${id}')">${label}</button>`).join('')}</div>`:''}<div class="coach-note"><b>PROSSIMO:</b> ${recommendedProgram().name}<br><span class="small">${recommendedProgram().goal}</span></div><div class="week">${weekPreview(true)}</div><div class="calendar-help">Tocca i giorni per adattare la settimana agli imprevisti. Il ciclo non viene azzerato.</div><button class="btn secondary" style="margin-top:10px" onclick="resetTrainingDays()">RIPRISTINA DISTRIBUZIONE STANDARD</button></section>${zones.map(z=>`<h2 style="margin-top:25px">${z}</h2>${PROGRAMS.filter(p=>p.zone===z).map(p=>`<section class="card program ${a===p.id?'active':''}"><div class="k">${p.zone}</div><h2>${p.name}</h2><p>${p.goal}</p><div class="meta"><span>${p.exercises.length} esercizi</span><span>${p.mins} min stimati</span></div>${p.exercises.map(d=>{let e=ex(d.id);return `<div class="exitem clickable" role="button" tabindex="0" onclick="openExercise('${d.id}')"><span>${e?.name||d.id}<small style="display:block;color:#888">${e?.base||''}</small></span><b>${d.sets}×${d.reps} ›</b></div>`}).join('')}<button class="btn ${pl.mode==='manual'&&pl.manualId===p.id?'secondary':'primary'}" style="margin-top:12px" onclick="chooseManual('${p.id}')">${pl.mode==='manual'&&pl.manualId===p.id?'MANUALE ATTIVO':'USA IN MANUALE'}</button></section>`).join('')}`).join('')}`}
function exercise(){let id=get('sc_selected_exercise',EX[0]?.id),e=ex(id);if(!e){app.innerHTML='<section class="card"><h2>Esercizio non trovato</h2></section>';return}let mem=memoryFor(e.id),sessions=get(K.history,[]).filter(s=>(s.ex||[]).some(x=>x.id===e.id)),audit=e.audit||'VERIFICATO',auditClass=audit==='VERIFICATO'?'audit-ok':'audit-warn';app.innerHTML=`<div class="k">${e.id} · ${e.zone}</div><h1>${e.name}</h1><p>${e.base}</p><section class="card"><div class="exercise-detail-grid"><div><div class="small">MUSCOLI</div><b>${e.muscles}</b></div><div><div class="small">CATEGORIA</div><b>${e.category}</b></div><div><div class="small">OBIETTIVO</div><b>${e.mission}</b></div><div><div class="small">PUNTEGGIO SC</div><b>${e.score}/100</b></div></div><div class="memory"><div class="small">SETUP</div><b>${e.setup}</b></div><div class="memory"><div class="small">ERRORI DA EVITARE</div><b>${e.errors}</b></div><div class="small ${auditClass}" style="margin-top:14px"><b>AUDIT MUSCLEWIKI:</b> ${audit}</div>${e.link?`<a class="btn primary mw-link" href="${e.link}" target="_blank" rel="noopener">▶ VIDEO ESATTO SU MUSCLEWIKI</a>`:`<div class="notify-card"><b>VIDEO MUSCLEWIKI NON COLLEGATO</b><div class="small">Non è stato lasciato un video simile ma sbagliato.</div></div>`}</section><section class="card"><div class="k">MEMORY ENGINE</div>${mem?`<h2>Ultimo riferimento</h2><p>${mem.program}</p>${mem.sets.map((x,i)=>`<div class="setrow"><b>${i+1}</b><span>${x.kg} kg</span><span>${x.reps} reps</span><span>RPE ${x.rpe}</span><span class="ok">✓</span></div>`).join('')}`:'<p>Nessun dato registrato.</p>'}<div class="small" style="margin-top:12px">${sessions.length} sessioni nello storico</div></section><button class="btn secondary" onclick="history.back()">‹ INDIETRO</button>`} 
function atlas(){app.innerHTML=`<div class="k">ATLANTE ANATOMICO COMPLETO · BUILD 004 FUSION</div><h1>MAPPA MUSCOLARE + MUSCLEWIKI</h1><p>Corpo umano fronte/retro, muscoli cliccabili, schede tecniche e collegamenti video sono stati ripristinati integralmente.</p><div class="atlas-shell"><iframe src="./atlas_legacy.html?embedded=1" title="Atlante anatomico PROJECT SC" loading="eager"></iframe></div>`}
function history(){let h=get(K.history,[]),tab=get('sc5_history_tab','workouts');app.innerHTML=`<div class="k">STORICO COMPLETO</div><h1>LA NOSTRA STORIA</h1><p>Qui convivono la tua cronologia di allenamento e quella di PROJECT SC OS. Perché cancellare il percorso ogni volta che cambia una schermata sarebbe una forma piuttosto elegante di amnesia.</p><div class="plan-tabs"><button class="${tab==='workouts'?'on':''}" onclick="set('sc5_history_tab','workouts');render()">WORKOUT</button><button class="${tab==='project'?'on':''}" onclick="set('sc5_history_tab','project');render()">PROJECT SC OS</button><button class="${tab==='stats'?'on':''}" onclick="set('sc5_history_tab','stats');render()">TOTALI</button></div>${tab==='project'?`<section class="card"><div class="timeline">${PROJECT_MILESTONES.slice().reverse().map(m=>`<div class="milestone"><div class="k">VERSIONE ${m.v}</div><h3>${m.title}</h3><p>${m.text}</p></div>`).join('')}</div></section>`:tab==='stats'?`<section class="card"><div class="stats"><div class="stat"><b>${h.length}</b><span>Workout</span></div><div class="stat"><b>${vol(h.reduce((a,x)=>a+(x.volume||0),0))}</b><span>Volume totale</span></div><div class="stat"><b>${h.reduce((a,x)=>a+(x.totalSets||0),0)}</b><span>Serie totali</span></div><div class="stat"><b>${PROJECT_MILESTONES.length}</b><span>Build tracciate</span></div></div></section>`:(h.length?h.map(s=>`<section class="card"><div class="k">${s.programId||'SESSIONE STORICA'}</div><h2>${s.program}</h2><div class="small">${new Date(s.end||s.start).toLocaleString('it-IT')}</div><div class="stats" style="margin-top:13px"><div class="stat"><b>${vol(s.volume)}</b><span>Volume</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div><div class="stat"><b>${fmt(((s.end||s.start)-s.start)/1000)}</b><span>Durata</span></div></div></section>`).join(''):'<p>Nessuna sessione completata. La storia del progetto, almeno, è già decisamente più lunga.</p>')}`}
function summary(s){app.innerHTML=`<section class="card" style="text-align:center"><div class="k">WORKOUT COMPLETATO</div><h1>${vol(s.volume)} KG</h1><p>Memoria aggiornata per ${s.ex.filter(e=>e.done.length).length} esercizi.</p><div class="stats"><div class="stat"><b>${fmt((s.end-s.start)/1000)}</b><span>Durata</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div><div class="stat"><b>${s.ex.length}</b><span>Esercizi</span></div></div><button class="btn primary" style="margin-top:16px" onclick="go('home')">TORNA ALLA HOME</button></section>`}
function render(){clearInterval(tick);navRender();({home,workout,programs,exercise,atlas,history}[route]||home)();if(route==='workout'){showTimer();tick=setInterval(()=>{let s=get(K.session,null);if(!s)return;let e=document.getElementById('elapsed');if(e)e.textContent=fmt((Date.now()-s.start)/1000);let left=(s.timerEnd-Date.now())/1000,t=document.getElementById('bigTimer');if(t)t.textContent=fmt(left);if(s.timerEnd&&left<=0&&!s.timerNotified){s.timerNotified=true;s.timerEnd=0;set(K.session,s);restFinishedNotification(s);overlay.innerHTML='';render()}},1000)}else overlay.innerHTML=''}addEventListener('hashchange',()=>{route=location.hash.slice(1)||'home';render()});if('serviceWorker' in navigator){
  window.addEventListener('load', async ()=>{
    try{
      const reg = await navigator.serviceWorker.register('./sw.js?v=4.5.1');
      await reg.update();
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    }catch(err){ console.warn('Service worker non disponibile:', err); }
  });
}
render();
</script></body></html>

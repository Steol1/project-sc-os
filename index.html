<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070707">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PROJECT SC">
<title>PROJECT SC OS 4.1.1</title>
<style>
:root{
  --bg:#050505;--panel:#111;--panel2:#181818;--line:#292929;--text:#f7f7f7;
  --muted:#8c8c8c;--orange:#ff6a00;--orange2:#ff9b4a;--green:#35d07f;--red:#ff5a52;
  --radius:24px;--shadow:0 18px 50px rgba(0,0,0,.32)
}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
body{min-height:100vh}button,input{font:inherit}button{cursor:pointer}
header{position:sticky;top:0;z-index:20;background:rgba(5,5,5,.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--line);padding:calc(14px + env(safe-area-inset-top)) 18px 13px}
.brand{font-weight:950;letter-spacing:.14em;font-size:14px}.version{font-size:10px;color:var(--orange);font-weight:900;letter-spacing:.16em;margin-top:3px}
main{max-width:820px;margin:auto;padding:18px 14px 122px}.kicker{font-size:11px;color:var(--orange);font-weight:950;letter-spacing:.18em;text-transform:uppercase}
h1{font-size:38px;line-height:.98;margin:9px 0 10px;letter-spacing:-.05em}h2{font-size:24px;margin:0 0 7px}p,.small{color:var(--muted);line-height:1.45}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:14px 0;box-shadow:var(--shadow)}
.hero{padding:22px;background:radial-gradient(circle at 100% 0,rgba(255,106,0,.28),transparent 35%),linear-gradient(180deg,#1b1b1b,#0e0e0e)}
.badge{display:inline-flex;align-items:center;gap:7px;border:1px solid #63300f;background:#251307;color:#ffb17d;border-radius:999px;padding:7px 10px;font-size:10px;font-weight:950;letter-spacing:.08em}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.meta span{border:1px solid var(--line);background:#0c0c0c;border-radius:12px;padding:9px 10px;color:#cfcfcf;font-size:12px}
.btn{width:100%;min-height:56px;border:0;border-radius:17px;font-weight:950;letter-spacing:.04em}
.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#080808;box-shadow:0 12px 30px rgba(255,106,0,.23)}
.secondary{background:#1b1b1b;color:#fff;border:1px solid #383838}.danger{background:#2a1110;color:#ff948e;border:1px solid #5c211c}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#0d0d0d;border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:21px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.progress{height:8px;background:#252525;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#ffa45f)}
.exercise-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.counter{font-size:11px;border:1px solid #3a3a3a;border-radius:999px;padding:7px 10px;color:#bdbdbd}
.form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.field{background:#090909;border:1px solid #343434;border-radius:18px;padding:12px}.field label{display:block;font-size:10px;color:var(--muted);font-weight:900;letter-spacing:.09em}.field input{width:100%;background:transparent;border:0;outline:0;color:white;font-size:32px;font-weight:950}
.rpe{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0 14px}.rpe button{padding:13px 0;border-radius:14px;border:1px solid #333;background:#101010;color:#aaa;font-weight:900}.rpe button.on{background:var(--orange);color:#050505;border-color:var(--orange)}
.lastbox{background:#0b0b0b;border:1px solid #303030;border-radius:18px;padding:14px;margin:14px 0}.lastgrid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.lastsets{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}.lastsets span{background:#161616;border:1px solid #303030;border-radius:10px;padding:7px 9px;font-size:11px;color:#ddd}
.row{display:grid;grid-template-columns:32px 1fr 1fr 1fr 30px;gap:5px;padding:10px 0;border-top:1px solid #252525;font-size:13px}.check{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:#143522;color:var(--green)}
.timer-screen{position:fixed;inset:0;z-index:50;background:rgba(4,4,4,.96);backdrop-filter:blur(16px);display:grid;place-items:center;padding:24px}
.timer-panel{text-align:center;width:min(420px,100%)}.ring{width:250px;height:250px;margin:0 auto 24px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--orange) var(--pct),#222 0);position:relative}.ring:after{content:"";position:absolute;inset:14px;border-radius:50%;background:#090909}.ring-inner{position:relative;z-index:1}.ring strong{font-size:54px;letter-spacing:-.06em}.ring .small{display:block;margin-bottom:4px}
.timer-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(7,7,7,.95);backdrop-filter:blur(20px);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr)}
nav button{background:none;border:0;color:#777;font-size:10px;font-weight:900;padding:7px 2px}nav button.on{color:var(--orange)}nav b{display:block;font-size:20px;margin-bottom:2px}
.summary{text-align:center}.summary .big{font-size:58px;font-weight:950;letter-spacing:-.06em}.pr{color:var(--orange);font-weight:950}
@media(max-width:540px){.stats{grid-template-columns:1fr 1fr}h1{font-size:34px}}
</style>
</head>
<body>
<header><div class="brand">PROJECT SC OS</div><div class="version">4.1.1 RC1 · BUILD 002 · EXPERIENCE</div></header>
<main id="app"></main>
<nav id="nav"></nav>
<div id="overlay"></div>
<script>
const EX=[
{id:"SC-0001",name:"THE BUILDER",base:"Chest Press",sets:4,reps:"6-10",rest:90,kg:60},
{id:"SC-0002",name:"THE COBRA",base:"Lat Machine",sets:4,reps:"6-10",rest:90,kg:55},
{id:"SC-0003",name:"THE CAP",base:"Shoulder Press",sets:3,reps:"8-12",rest:90,kg:32.5},
{id:"SC-0004",name:"THE SPIDER",base:"Spider Curl EZ",sets:3,reps:"8-12",rest:75,kg:21.5},
{id:"SC-0005",name:"THE ROPE",base:"Estensioni tricipiti",sets:3,reps:"10-15",rest:75,kg:25},
{id:"SC-0006",name:"THE PLATFORM",base:"Leg Press",sets:4,reps:"8-12",rest:120,kg:120}
];
const PROGRAMS=[
{id:"lab-b",name:"THE LAB B",sub:"PULL CONTROL",mins:82,ids:["SC-0002","SC-0001","SC-0003","SC-0004","SC-0005","SC-0006"]},
{id:"lab-a",name:"THE LAB A",sub:"PUSH ENGINE",mins:76,ids:["SC-0001","SC-0003","SC-0005","SC-0002","SC-0004"]}
];
const K={prog:"sc_prog",session:"sc_session",history:"sc_history"};
const get=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}},set=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let route=location.hash.slice(1)||"home",rpe=8,tick;
const app=document.getElementById("app"),nav=document.getElementById("nav"),overlay=document.getElementById("overlay");
const fmt=s=>{s=Math.max(0,Math.floor(s));return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")};
const vol=n=>Math.round(n).toLocaleString("it-IT");
function go(r){location.hash=r}
function activeProgram(){return PROGRAMS.find(p=>p.id==get(K.prog,"lab-b"))||PROGRAMS[0]}
function saveDraft(){const s=get(K.session,null),kg=document.getElementById("kg"),reps=document.getElementById("reps");if(!s||!kg||!reps)return;s.draft={exerciseId:s.ex[s.i].id,kg:kg.value,reps:reps.value,rpe};set(K.session,s)}
function selectRpe(v){rpe=v;document.querySelectorAll(".rpe button").forEach(b=>b.classList.toggle("on",Number(b.textContent)==v));saveDraft()}
function navRender(){nav.innerHTML=[["home","⌂","HOME"],["workout","▶","WORKOUT"],["programs","▦","PROGRAMMI"],["history","◷","STORICO"],["settings","⚙","SETTINGS"]].map(x=>`<button class="${route==x[0]?"on":""}" onclick="go('${x[0]}')"><b>${x[1]}</b>${x[2]}</button>`).join("")}
function previousExerciseData(id){
 const h=get(K.history,[]);
 for(const s of h){const e=(s.ex||[]).find(x=>x.id==id);if(e&&e.done&&e.done.length)return e}
 return null
}
function bestFor(id){
 const h=get(K.history,[]);let bw=0,bv=0,br=0;
 h.forEach(s=>(s.ex||[]).filter(e=>e.id==id).forEach(e=>(e.done||[]).forEach(x=>{bw=Math.max(bw,+x.kg);br=Math.max(br,+x.reps);bv=Math.max(bv,+x.kg*+x.reps)})));
 return {bw,bv,br}
}
function start(){const p=activeProgram(),s={id:"W"+Date.now(),program:p.name,programId:p.id,sub:p.sub,start:Date.now(),i:0,volume:0,totalSets:0,totalReps:0,status:"RUNNING",timerEnd:0,ex:p.ids.map(id=>({...EX.find(e=>e.id==id),done:[]}))};set(K.session,s);go("workout")}
function useLast(){
 const s=get(K.session,null),e=s.ex[s.i],prev=previousExerciseData(e.id);if(!prev||!prev.done.length)return;
 const x=prev.done[Math.min(e.done.length,prev.done.length-1)];
 document.getElementById("kg").value=x.kg;document.getElementById("reps").value=x.reps;saveDraft()
}
function saveSet(){
 let s=get(K.session,null),e=s.ex[s.i],kg=+document.getElementById("kg").value,reps=+document.getElementById("reps").value;if(!kg||!reps)return alert("Inserisci kg e ripetizioni");
 e.done.push({kg,reps,rpe,at:Date.now()});delete s.draft;s.volume+=kg*reps;s.totalSets++;s.totalReps+=reps;s.timerEnd=Date.now()+e.rest*1000;
 if(e.done.length>=e.sets){if(s.i<s.ex.length-1)s.i++;else s.status="READY"}
 set(K.session,s);render();showTimer()
}
function skipTimer(){let s=get(K.session,null);if(!s)return;s.timerEnd=0;set(K.session,s);overlay.innerHTML="";render()}
function addTime(){let s=get(K.session,null);if(!s)return;s.timerEnd+=30000;set(K.session,s);showTimer()}
function showTimer(){
 let s=get(K.session,null);if(!s||s.timerEnd<=Date.now()){overlay.innerHTML="";return}
 const total=(s.ex[Math.max(0,s.i-1)]?.rest||90),left=Math.ceil((s.timerEnd-Date.now())/1000),pct=Math.max(0,Math.min(100,left/total*100));
 overlay.innerHTML=`<div class="timer-screen"><div class="timer-panel"><div class="ring" style="--pct:${pct}%"><div class="ring-inner"><span class="small">RECOVERY</span><strong id="bigTimer">${fmt(left)}</strong></div></div><div class="timer-actions"><button class="btn secondary" onclick="addTime()">+30 SEC</button><button class="btn primary" onclick="skipTimer()">SALTA</button></div></div></div>`;
}
function finish(){
 let s=get(K.session,null);s.end=Date.now();s.status="COMPLETED";s.timerEnd=0;let h=get(K.history,[]);h.unshift(s);set(K.history,h);localStorage.removeItem(K.session);overlay.innerHTML="";summary(s)
}
function home(){
 const p=activeProgram(),s=get(K.session,null),h=get(K.history,[])[0];
 app.innerHTML=`<div class="kicker">${new Date().toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()}</div><h1>${s?"SESSIONE IN CORSO":"GOOD TRAINING"}</h1><p>${s?"Riprendi esattamente da dove eri rimasto. Il browser, per una volta, ha fatto il suo lavoro.":"Il sistema è pronto per la prossima sessione."}</p>
 <section class="card hero"><span class="badge">${s?"● LIVE":"PROGRAMMA ATTIVO"}</span><h2 style="margin-top:14px">${s?s.program:p.name}</h2><div class="small">${s?s.sub:p.sub}</div>
 <div class="meta"><span>⏱ ${s?fmt((Date.now()-s.start)/1000):p.mins+" min"}</span><span>▦ ${s?s.totalSets:p.ids.length+" esercizi"}</span><span>◈ ${s?vol(s.volume)+" kg":"AutoSave"}</span></div>
 <button class="btn primary" onclick="${s?"go('workout')":"start()"}">${s?"RESUME WORKOUT":"START WORKOUT"}</button></section>
 <div class="stats"><div class="stat"><b>${h?vol(h.volume):0}</b><span>Ultimo volume</span></div><div class="stat"><b>${h?h.totalSets:0}</b><span>Serie</span></div><div class="stat"><b>${h?h.totalReps:0}</b><span>Reps</span></div><div class="stat"><b>${h?fmt((h.end-h.start)/1000):"--:--"}</b><span>Durata</span></div></div>`
}
function workout(){
 const s=get(K.session,null);if(!s){app.innerHTML=`<section class="card"><h2>Nessun workout attivo</h2><button class="btn primary" onclick="go('home')">TORNA ALLA HOME</button></section>`;return}
 const e=s.ex[s.i],done=e.done.length,pr=((s.i+done/e.sets)/s.ex.length)*100,prev=previousExerciseData(e.id),best=bestFor(e.id);
 const suggested=s.draft?.exerciseId==e.id?s.draft.kg:(prev?.done?.[Math.min(done,prev.done.length-1)]?.kg??e.kg),suggestedReps=s.draft?.exerciseId==e.id?s.draft.reps:(prev?.done?.[Math.min(done,prev.done.length-1)]?.reps??8);
 app.innerHTML=`<div class="stats"><div class="stat"><b id="elapsed">${fmt((Date.now()-s.start)/1000)}</b><span>Tempo</span></div><div class="stat"><b>${vol(s.volume)}</b><span>Volume</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div></div>
 <section class="card"><div class="exercise-title"><div><div class="kicker">${e.id}</div><h1>${e.name}</h1><div class="small">${e.base} · ${e.sets} × ${e.reps} · recupero ${e.rest}"</div></div><span class="counter">${s.i+1}/${s.ex.length}</span></div>
 <div class="progress" style="margin:16px 0"><i style="width:${pr}%"></i></div>
 ${prev?`<div class="lastbox"><div class="lastgrid"><div><div class="small">LAST TIME</div><div class="lastsets">${prev.done.map(x=>`<span>${x.kg}×${x.reps}</span>`).join("")}</div></div><button class="btn secondary" style="width:auto;padding:0 14px" onclick="useLast()">USE LAST</button></div></div>`:""}
 ${best.bw?`<div class="meta"><span>BEST KG ${best.bw}</span><span>BEST REPS ${best.br}</span><span>BEST SET ${best.bv} kg</span></div>`:""}
 ${s.status=="READY"?`<button class="btn primary" onclick="finish()">TERMINA WORKOUT</button>`:`<div class="small">SET ${done+1} DI ${e.sets}</div><div class="form"><div class="field"><label>KG</label><input id="kg" type="number" inputmode="decimal" step=".5" value="${suggested}" oninput="saveDraft()"></div><div class="field"><label>REPS</label><input id="reps" type="number" inputmode="numeric" value="${suggestedReps}" oninput="saveDraft()"></div></div><div class="small" style="margin-top:12px">RPE</div><div class="rpe">${[6,7,8,9,10].map(v=>`<button class="${rpe==v?"on":""}" onclick="selectRpe(${v})">${v}</button>`).join("")}</div><button class="btn primary" onclick="saveSet()">✓ COMPLETE SET</button>`}
 <div style="margin-top:16px"><div class="small">SERIE COMPLETATE</div>${e.done.length?e.done.map((x,i)=>`<div class="row"><b>${i+1}</b><span>${x.kg} kg</span><span>${x.reps} reps</span><span>RPE ${x.rpe}</span><span class="check">✓</span></div>`).join(""):"<p>Nessuna serie completata.</p>"}</div></section>
 <button class="btn danger" onclick="if(confirm('Annullare la sessione?')){localStorage.removeItem(K.session);go('home')}">ANNULLA SESSIONE</button>`
}
function programs(){let a=get(K.prog,"lab-b");app.innerHTML=`<div class="kicker">PROGRAMMI</div><h1>SCEGLI IL MOTORE</h1>${PROGRAMS.map(p=>`<section class="card hero"><span class="badge">${a==p.id?"ACTIVE":"PROGRAMMA"}</span><h2 style="margin-top:12px">${p.name}</h2><div class="small">${p.sub}</div><div class="meta"><span>${p.ids.length} esercizi</span><span>${p.mins} min</span></div><button class="btn ${a==p.id?"secondary":"primary"}" onclick="set(K.prog,'${p.id}');render()">${a==p.id?"PROGRAMMA ATTIVO":"IMPOSTA ATTIVO"}</button></section>`).join("")}`}
function history(){let h=get(K.history,[]);app.innerHTML=`<div class="kicker">STORICO</div><h1>SESSIONI</h1>${h.length?h.map(s=>`<section class="card"><h2>${s.program}</h2><div class="small">${new Date(s.end).toLocaleString("it-IT")}</div><div class="stats" style="margin-top:14px"><div class="stat"><b>${vol(s.volume)}</b><span>Volume</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div><div class="stat"><b>${fmt((s.end-s.start)/1000)}</b><span>Durata</span></div></div></section>`).join(""):"<p>Nessuna sessione completata.</p>"}`}
function settings(){app.innerHTML=`<div class="kicker">SETTINGS</div><h1>SISTEMA</h1><section class="card"><h2>BUILD 002 · EXPERIENCE</h2><p>Timer immersivo, resume session, storico esercizio, USE LAST, record e riepilogo evoluto.</p><button class="btn danger" onclick="if(confirm('Cancellare tutti i dati?')){localStorage.clear();go('home')}">AZZERA DATI LOCALI</button></section>`}
function summary(s){
 const old=get(K.history,[])[1],isPR=!old||s.volume>old.volume;
 app.innerHTML=`<section class="card summary"><div class="kicker">WORKOUT COMPLETATO</div><div class="big">${vol(s.volume)}</div><div class="small">KG DI VOLUME</div>${isPR?'<p class="pr">NEW SESSION VOLUME RECORD</p>':""}<div class="stats" style="margin-top:20px"><div class="stat"><b>${fmt((s.end-s.start)/1000)}</b><span>Durata</span></div><div class="stat"><b>${s.totalSets}</b><span>Serie</span></div><div class="stat"><b>${s.totalReps}</b><span>Reps</span></div><div class="stat"><b>${s.ex.length}</b><span>Esercizi</span></div></div><button class="btn primary" style="margin-top:18px" onclick="go('home')">TORNA ALLA HOME</button></section>`
}
function render(){clearInterval(tick);navRender();({home,workout,programs,history,settings}[route]||home)();if(route=="workout"){showTimer();tick=setInterval(()=>{let s=get(K.session,null);if(!s)return;let e=document.getElementById("elapsed");if(e)e.textContent=fmt((Date.now()-s.start)/1000);let t=document.getElementById("bigTimer");if(t){let left=(s.timerEnd-Date.now())/1000;t.textContent=fmt(left);if(left<=0){overlay.innerHTML="";render()}}},1000)}else overlay.innerHTML=""}
addEventListener("hashchange",()=>{route=location.hash.slice(1)||"home";render()});render()
</script>
</body>
</html>

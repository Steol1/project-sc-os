  [&quot;glutei&quot;, &quot;gluteal&quot;],
  [&quot;quadricipite&quot;, &quot;quadriceps&quot;],
  [&quot;quadricipiti&quot;, &quot;quadriceps&quot;],
  [&quot;quadricipiti&quot;, &quot;quadriceps&quot;],
  [&quot;femorali&quot;, &quot;hamstring&quot;],
  [&quot;hamstring&quot;, &quot;hamstring&quot;],
  [&quot;polpaccio&quot;, &quot;calves&quot;],
  [&quot;polpacci&quot;, &quot;calves&quot;],
  [&quot;tibiale&quot;, &quot;tibialis&quot;],
  [&quot;adduttori&quot;, &quot;adductors&quot;]
];

function muscleData(text){
  const normalized = String(text || &quot;&quot;).toLowerCase();
  const names = normalized.split(&quot;,&quot;).map(x=&gt;x.trim()).filter(Boolean);
  const ranks = new Map();

  if(normalized.includes(&quot;full body&quot;) || normalized.includes(&quot;corpo intero&quot;)){
    [
      &quot;chest&quot;,&quot;deltoids&quot;,&quot;biceps&quot;,&quot;triceps&quot;,&quot;forearm&quot;,
      &quot;upper-back&quot;,&quot;trapezius&quot;,&quot;abs&quot;,&quot;obliques&quot;,
      &quot;gluteal&quot;,&quot;quadriceps&quot;,&quot;hamstring&quot;,&quot;calves&quot;
    ].forEach((slug,index)=&gt;ranks.set(slug,index&lt;8?1:2));
  }

  names.forEach((name, index)=&gt;{
    slugRules.forEach(([term, slug])=&gt;{
      if(name.includes(term)){
        const current = ranks.get(slug);
        const intensity = index === 0 ? 1 : 2;
        if(!current || intensity &lt; current) ranks.set(slug, intensity);
      }
    });
  });

  return Array.from(ranks, ([slug, intensity])=&gt;({
    slug,
    color: intensity === 1 ? &quot;#ff7800&quot; : &quot;#ffb15a&quot;,
    styles:{
      fill:intensity === 1 ? &quot;#ff7800&quot; : &quot;#ffb15a&quot;,
      stroke:&quot;#ff9a32&quot;,
      strokeWidth:1.4
    }
  }));
}

window.renderMuscleMap = function(text){
  const data = muscleData(text);
  const common = {
    data,
    gender:&quot;male&quot;,
    scale:0.75,
    colors:[&quot;#ff7800&quot;,&quot;#ffb15a&quot;],
    defaultFill:&quot;#171b20&quot;,
    defaultStroke:&quot;#69727d&quot;,
    defaultStrokeWidth:1.2,
    border:&quot;#8d96a0&quot;
  };

  frontRoot.render(React.createElement(Body,{...common,side:&quot;front&quot;}));
  backRoot.render(React.createElement(Body,{...common,side:&quot;back&quot;}));

  statusEl.textContent = data.length
    ? &quot;MAPPA SVG SEGMENTATA ATTIVA&quot;
    : &quot;NESSUN GRUPPO MUSCOLARE ASSOCIATO&quot;;
  statusEl.className = &quot;anatomy-status ready&quot;;
};

window.renderMuscleMap(window.__pendingMuscles || &quot;gran dorsale, grande rotondo, bicipite&quot;);
window.addEventListener(&quot;message&quot;,ev=&gt;{
  const d=ev.data||{};
  if(d.type===&quot;open-exercise&quot; &amp;&amp; d.code &amp;&amp; typeof detail===&quot;function&quot;){
    detail(d.code);
    window.scrollTo({top:0,behavior:&quot;smooth&quot;});
  }
});
&lt;/script&gt;

&lt;/body&gt;&lt;/html&gt;"></iframe>
</div>
<div id="toast" class="link-toast">Scheda tecnica aperta</div>
<script>
const tabs=[...document.querySelectorAll(".tab")];
const frames=[...document.querySelectorAll("iframe")];
function showFrame(id){
  tabs.forEach(t=>t.classList.toggle("active",t.dataset.target===id));
  frames.forEach(f=>f.classList.toggle("active",f.id===id));
}
tabs.forEach(t=>t.onclick=()=>showFrame(t.dataset.target));
window.addEventListener("message",ev=>{
  const d=ev.data||{};
  if(d.type==="open-doc"){
    showFrame("docsFrame");
    const docs=document.getElementById("docsFrame");
    const send=()=>docs.contentWindow.postMessage({type:"open-exercise",code:d.code},"*");
    if(docs.contentDocument?.readyState==="complete") send();
    else docs.addEventListener("load",send,{once:true});
    const toast=document.getElementById("toast");
    toast.textContent=`Aperta la scheda ${d.code}`;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"),1800);
  }
});
</script>
